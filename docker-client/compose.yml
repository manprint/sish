services:
  sish-client-env-password:
    profiles: ["env-password"]
    build:
      context: ..
      dockerfile: docker-client/Dockerfile
    image: sish-client:dev
    container_name: sish-client-env-password
    environment:
      SSH_HOST: "tuns.0912345.xyz"
      SSH_PORT: "2222"
      SSH_USER: "beta"
      SSH_AUTH_MODE: "password"
      SSH_STRICT_HOST_KEY_CHECKING: "no"
      SSH_USER_KNOWN_HOSTS_FILE: "/tmp/ssh_known_hosts"
      SSH_SERVER_ALIVE_INTERVAL: "30"
      SSH_SERVER_ALIVE_COUNT_MAX: "3"
      SSH_CONNECT_TIMEOUT: "10"
      SSH_EXIT_ON_FORWARD_FAILURE: "yes"
      SSH_PASSWORD: "change-me"
      SSH_REMOTE_FORWARDS: "myapp:80:localhost:8080"
      SISH_CLIENT_AUTORESTART: "true"
      SISH_CLIENT_RESTART_DELAY_SECONDS: "3"
      FORWARDER_LOG_FILE: "/app/log/forwarder/env-password.outputs.log"
      STATS_LOG_FILE: "/app/log/stats/env-password.stats.log"
      FORWARDER_LOG_MAX_SIZE_MB: "100"
      FORWARDER_LOG_MAX_AGE_HOURS: "168"
      FORWARDER_LOG_MAX_FILES: "30"
      STATS_LOG_MAX_SIZE_MB: "20"
      STATS_LOG_MAX_AGE_HOURS: "720"
      STATS_LOG_MAX_FILES: "60"
    volumes:
      - ./log:/app/log
    restart: unless-stopped

  sish-client-env-pubkey:
